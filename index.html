<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransTrack - Supervision Master 2</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; height: 100vh; background-color: #1a1a1a; color: #fff; overflow: hidden; }
        
        /* Écran de Connexion Forcé */
        #auth-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(20, 20, 20, 0.95); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        .auth-box {
            background: #2a2a2a; padding: 40px; border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5); width: 100%; max-width: 400px; text-align: center;
        }
        .auth-box h2 { color: #00e676; margin-bottom: 20px; font-weight: 600; }
        .auth-box input {
            width: 100%; padding: 12px; margin: 10px 0;
            background: #1a1a1a; border: 1px solid #444; border-radius: 6px; color: #fff; font-size: 16px;
        }
        .auth-box button {
            width: 100%; padding: 12px; background: #00e676; border: none;
            border-radius: 6px; color: #1a1a1a; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 15px;
        }

        /* Interface Principale */
        #sidebar { width: 400px; background: #222; display: flex; flex-direction: column; border-right: 2px solid #333; }
        .header { padding: 15px; background: #111; border-bottom: 1px solid #333; text-align: center; }
        .header h1 { font-size: 18px; color: #00e676; font-weight: 600; }
        .status-bar { padding: 8px; background: #2c2c2c; text-align: center; font-size: 12px; font-weight: bold; }
        .online { color: #00e676; } .offline { color: #ff5252; }
        
        /* Système d'onglets (Navigation Menu) */
        .tabs-menu { display: flex; background: #1a1a1a; border-bottom: 2px solid #333; }
        .tab-btn { flex: 1; padding: 12px 5px; background: none; border: none; color: #aaa; cursor: pointer; font-size: 12px; font-weight: bold; text-transform: uppercase; transition: 0.2s; border-bottom: 3px solid transparent; }
        .tab-btn:hover { color: #fff; background: #252525; }
        .tab-btn.active { color: #00e676; border-bottom-color: #00e676; background: #222; }

        /* Contenu des Onglets */
        .panel-content { flex: 1; padding: 20px; overflow-y: auto; display: none; }
        .panel-content.active { display: block; }
        
        .panel-content h3 { margin-bottom: 15px; font-size: 14px; text-transform: uppercase; color: #aaa; letter-spacing: 1px; }
        
        /* Conteneurs de données */
        .log-container {
            background: #111; border-radius: 8px; padding: 12px; height: 100%;
            overflow-y: auto; font-family: monospace; font-size: 12px; border: 1px solid #333;
        }
        .log-line { margin-bottom: 10px; padding: 8px; border-radius: 4px; background: #1a1a1a; border-left: 4px solid #444; }
        .log-line.infraction { border-left-color: #ff5252; color: #ff8a80; }
        
        /* Design Groupement des Plaintes */
        .complaint-group { background: #1b1b1b; border: 1px solid #333; border-radius: 6px; padding: 12px; margin-bottom: 12px; }
        .complaint-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 13px; color: #ffb300; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 4px; }
        .complaint-count { background: #ffb300; color: #000; padding: 2px 6px; border-radius: 10px; font-size: 11px; }
        .complaint-body { font-size: 12px; color: #ddd; padding-left: 5px; list-style-type: square; }
        .complaint-item { margin-bottom: 4px; }

        /* Bloc Configuration */
        .config-group { background: #111; padding: 15px; border-radius: 8px; border: 1px solid #333; margin-bottom: 15px; }
        .config-group label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; }
        .config-group input { width: 100%; padding: 8px; background: #222; border: 1px solid #444; color: #fff; border-radius: 4px; margin-bottom: 10px; }

        #map-container { flex: 1; position: relative; background: #111; }
        #map { width: 100%; height: 100%; }

        /* Animation Clignotement Alerte Rouge */
        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 82, 82, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(255, 82, 82, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 82, 82, 0); }
        }
        .alert-marker { animation: pulse-red 1.5s infinite; background-color: #ff5252 !important; color: white !important; }

        /* Bouton Géolocalisation */
        .geo-btn {
            position: absolute; top: 80px; left: 10px; z-index: 1000;
            background: white; width: 34px; height: 34px; border-radius: 4px;
            border: 2px solid rgba(0,0,0,0.2); cursor: pointer;
            display: flex; justify-content: center; align-items: center; font-size: 18px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.65);
        }
    </style>
</head>
<body>

    <!-- ÉCRAN D'AUTHENTIFICATION -->
    <div id="auth-screen">
        <div class="auth-box">
            <h2>TransTrack Admin</h2>
            <input type="text" name="prevent_autofill" style="display:none;" />
            <input type="password" name="prevent_autofill_pwd" style="display:none;" />
            
            <input type="text" id="username" placeholder="Identifiant" autocomplete="new-password" required>
            <input type="password" id="password" placeholder="Mot de passe" autocomplete="new-password" required>
            <button onclick="verifierLogin()">Se connecter</button>
            <p id="auth-error" style="color: #ff5252; margin-top: 10px; font-size: 14px; display: none;">Accès refusé.</p>
        </div>
    </div>

    <!-- PANNEAU LATÉRAL MULTI-PAGES -->
    <div id="sidebar">
        <div class="header">
            <h1>TRANSTRACK EXPERT</h1>
        </div>
        <div id="status-indicator" class="status-bar offline">SERVEUR HORS LIGNE</div>
        
        <!-- Navigation Menu Onglets -->
        <div class="tabs-menu">
            <button class="tab-btn active" onclick="switchTab('tab-suivi')">Suivi & Alertes</button>
            <button class="tab-btn" onclick="switchTab('tab-plaintes')">Plaintes</button>
            <button class="tab-btn" onclick="switchTab('tab-config')">Configuration</button>
        </div>
        
        <!-- PAGE 1 : SUIVI & ALERTES -->
        <div id="tab-suivi" class="panel-content active">
            <h3>Alertes de Déviation Géofencing</h3>
            <div id="infractions-log" class="log-container">
                <div class="log-line">En attente de détections...</div>
            </div>
        </div>
        
        <!-- PAGE 2 : PLAINTES CITOYENNES REGROUPÉES -->
        <div id="tab-plaintes" class="panel-content">
            <h3>Plaintes Citoyennes (Par Utilisateur/Véhicule)</h3>
            <div id="plaintes-grouped-container" style="height: 100%; overflow-y: auto;">
                <div class="log-line" style="font-family: monospace; font-size: 12px;">Aucune plainte enregistrée.</div>
            </div>
        </div>
        
        <!-- PAGE 3 : CONFIGURATION ADMIN -->
        <div id="tab-config" class="panel-content">
            <h3>Paramètres de l'Architecture</h3>
            <div class="config-group">
                <label>Seuil d'Alerte Déviation (mètres)</label>
                <input type="number" id="cfg-seuil" value="50" disabled>
                
                <label>Fréquence d'Échantillonnage Reçue</label>
                <input type="text" id="cfg-freq" value="Dynamique (MQTT)" disabled>
                
                <label>Statut de la Base de Données</label>
                <input type="text" value="Railway Connectée (4 tables)" disabled style="color: #00e676; font-weight: bold;">
            </div>
            <p style="font-size: 11px; color: #aaa; text-align: center;">Système d'aide à la décision - Données de cadrage Master 2</p>
        </div>
    </div>

    <!-- CONTENEUR CARTOGRAPHIQUE -->
    <div id="map-container">
        <div id="map"></div>
        <button class="geo-btn" onclick="geolocaliserUtilisateur()" title="Ma position">🎯</button>
    </div>

    <!-- SCRIPTS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Gestion de la mémoire et stockage des états de regroupement
        let map, busMarkers = {}, busPaths = {}, busPoints = {};
        let plaintesRegistre = {}; // Structure: { "idCitoyen_idVehicule": [messages] }
        let alertesActives = {};   // Structure: { idVehicule: true/false }
        let userLocationMarker = null;

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
            }, 50);
        });

        function verifierLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if(user === "admin" && pass === "admin123") {
                document.getElementById('auth-screen').style.display = 'none';
                initialiserSysteme();
            } else {
                const err = document.getElementById('auth-error');
                err.style.display = 'block';
                err.innerText = "Identifiants invalides.";
            }
        }

        // Navigation entre les pages (onglets)
        function switchTab(tabId) {
            document.querySelectorAll('.panel-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        function initialiserSysteme() {
            map = L.map('map', {
                fadeAnimation: true, zoomAnimation: true, markerZoomAnimation: true,
                updateWhenIdle: false, updateWhenZooming: true
            }).setView([-11.6608, 27.4794], 14);

            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: 'Tiles &copy; Esri',
                maxZoom: 19, keepBuffer: 8, updateWhenIdle: false
            }).addTo(map);

            // Nettoyer les messages par défaut lors de la connexion initiale
            document.getElementById('infractions-log').innerHTML = '';
            document.getElementById('plaintes-grouped-container').innerHTML = '';

            connecterServeur();
        }

        function geolocaliserUtilisateur() {
            if (!navigator.geolocation) return alert("Géolocalisation non supportée.");
            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude; const lon = pos.coords.longitude;
                map.setView([lat, lon], 16, { animate: true, duration: 1 });
                if (userLocationMarker) { userLocationMarker.setLatLng([lat, lon]); } 
                else {
                    const userIcon = L.divIcon({
                        className: 'user-icon',
                        html: '<div style="background-color: #007bff; width: 14px; height: 14px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 8px rgba(0,0,0,0.5);"></div>',
                        iconSize: [14, 14], iconAnchor: [7, 7]
                    });
                    userLocationMarker = L.marker([lat, lon], { icon: userIcon }).addTo(map).bindPopup("Moi").openPopup();
                }
            }, null, { enableHighAccuracy: true });
        }

        function connecterServeur() {
            const statusIndicator = document.getElementById('status-indicator');
            const socket = new WebSocket('wss://transtrack-backend-1grb.onrender.com');

            socket.onopen = () => {
                statusIndicator.innerText = "SERVEUR CLOUD EN LIGNE";
                statusIndicator.className = "status-bar online";
            };

            socket.onclose = () => {
                statusIndicator.innerText = "SERVEUR HORS LIGNE (TENTATIVE...)";
                statusIndicator.className = "status-bar offline";
                setTimeout(connecterServeur, 5000);
            };

            socket.onmessage = (event) => {
                const paquet = jsonParseSecure(event.data);
                if (!paquet) return;

                if (paquet.type === "POSITION") {
                    mettreAjourBus(paquet.data);
                } else if (paquet.type === "INFRACTION_TRAJET") {
                    gererAlerteInfraction(paquet.data);
                } else if (paquet.type === "PLAINTE") {
                    gererPlainteGrouped(paquet.data);
                }
            };
        }

        // GESTION DU VÉHICULE, DU TRACÉ COMPLET ET DES POINTS DE PRISE
        function mettreAjourBus(data) {
            const id = data.id_vehicule;
            const lat = parseFloat(data.latitude);
            const lon = parseFloat(data.longitude);
            const nouvellePosition = [lat, lon];

            // 1. Gérer le tracé linéaire (Polyline)
            if (!busPaths[id]) {
                busPaths[id] = L.polyline([], { color: '#00e676', weight: 4, opacity: 0.85 }).addTo(map);
            }
            busPaths[id].addLatLng(nouvellePosition);

            // 2. Gérer le point de prise de position (Petit cercle historique)
            if (!busPoints[id]) { busPoints[id] = []; }
            const pointDePrise = L.circleMarker(nouvellePosition, {
                radius: 4, fillColor: '#ffffff', color: '#1a1a1a', weight: 1, fillOpacity: 1
            }).addTo(map).bindPopup(`Point GPS n°${busPoints[id].length + 1}<br>Lat: ${lat}<br>Lon: ${lon}`);
            busPoints[id].push(pointDePrise);

            // 3. Déterminer la classe CSS selon l'état de l'alerte active du bus
            const alerteStyle = alertesActives[id] ? 'alert-marker' : '';

            // 4. Placer ou déplacer le marqueur du véhicule principal
            if (busMarkers[id]) {
                busMarkers[id].setLatLng(nouvellePosition);
                // Mettre à jour dynamiquement l'élément HTML interne de l'icône sans recréer l'objet
                const elem = busMarkers[id].getElement();
                if (elem) {
                    const iconeInterne = elem.querySelector('.custom-bus-div');
                    if (iconeInterne) {
                        if (alertesActives[id]) { iconeInterne.classList.add('alert-marker'); } 
                        else { iconeInterne.classList.remove('alert-marker'); }
                    }
                }
            } else {
                const busIcon = L.divIcon({
                    className: 'custom-bus-icon',
                    html: `<div class="custom-bus-div ${alerteStyle}" style="background-color: #00e676; color: #1a1a1a; font-weight: bold; font-size: 11px; width: 26px; height: 26px; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 2px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.4); transition: 0.3s;">#${id}</div>`,
                    iconSize: [26, 26], iconAnchor: [13, 13]
                });
                busMarkers[id] = L.marker(nouvellePosition, { icon: busIcon }).addTo(map)
                    .bindPopup(`<b>Véhicule de Transport #${id}</b><br>Statut de suivi actif.`);
            }
        }

        // GESTION DES INFRACTIONS ET ALERTE VISUELLE ROUGE
        function gererAlerteInfraction(data) {
            const id = data.id_vehicule;
            alertesActives[id] = true; // Activer le drapeau d'alerte rouge pour ce bus

            // Si le tracé existe, le passer temporairement en rouge pour l'analyse visuelle
            if (busPaths[id]) { busPaths[id].setStyle({ color: '#ff5252' }); }

            // Forcer la mise à jour immédiate de l'icône si le marqueur existe déjà
            if (busMarkers[id]) {
                const elem = busMarkers[id].getElement();
                if (elem) {
                    const iconeInterne = elem.querySelector('.custom-bus-div');
                    if (iconeInterne) iconeInterne.classList.add('alert-marker');
                }
            }

            // Ajouter la notification sur la page "Suivi & Alertes"
            const container = document.getElementById('infractions-log');
            const ligne = document.createElement('div');
            ligne.className = "log-line infraction";
            ligne.innerHTML = `⚠️ <b>[ALERTE BUS #${id}]</b> Écart de trajectoire critique détecté ! Éloignement de <b>${parseFloat(data.distance_ecart).toFixed(1)}m</b> de la ligne assignée.`;
            container.prepend(ligne);
        }

        // GESTION ET REGROUPEMENT INTELLIGENT DES PLAINTES
        function gererPlainteGrouped(data) {
            const idCitoyen = data.id_citoyen || "Anonyme";
            const idVehicule = data.id_vehicule;
            const message = data.message;
            const cleUnique = `${idCitoyen}_${idVehicule}`;

            // Initialiser la clé si elle n'existe pas
            if (!plaintesRegistre[cleUnique]) {
                plaintesRegistre[cleUnique] = {
                    citoyen: idCitoyen,
                    vehicule: idVehicule,
                    messages: []
                };
            }
            // Ajouter le nouveau message à l'historique de cette personne
            plaintesRegistre[cleUnique].messages.push(message);

            // Ré-afficher la page des plaintes de façon structurée
            rafraichirInterfacePlaintes();
        }

        function rafraichirInterfacePlaintes() {
            const container = document.getElementById('plaintes-grouped-container');
            container.innerHTML = ''; // Nettoyer

            Object.keys(plaintesRegistre).forEach(cle => {
                const groupe = plaintesRegistre[cle];
                
                const card = document.createElement('div');
                card.className = "complaint-group";
                
                let listeMessagesHTML = '';
                groupe.messages.forEach(msg => {
                    listeMessagesHTML += `<li class="complaint-item">${msg}</li>`;
                });

                card.innerHTML = `
                    <div class="complaint-header">
                        <span>👤 User ID: ${groupe.citoyen} &rarr; Bus #${groupe.vehicule}</span>
                        <span class="complaint-count">${groupe.messages.length} plainte(s)</span>
                    </div>
                    <ul class="complaint-body">
                        ${listeMessagesHTML}
                    </ul>
                `;
                container.prepend(card);
            });
        }

        function jsonParseSecure(texte) {
            try { return JSON.parse(texte); } 
            catch(e) { return null; }
        }
    </script>
</body>
</html>
