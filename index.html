<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransTrack - Supervision Master 2</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; height: 100vh; background-color: #1a1a1a; color: #fff; overflow: hidden; }
        
        /* Écran de Connexion Forcé */
        #auth-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(20, 20, 20, 0.95); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        .auth-box {
            background: #2a2a2a; padding: 40px; border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5); width: 100%; max-width: 400px; text-align: center;
        }
        .auth-box h2 { color: #00e676; margin-bottom: 20px; font-weight: 600; }
        .auth-box input {
            width: 100%; padding: 12px; margin: 10px 0;
            background: #1a1a1a; border: 1px solid #444; border-radius: 6px; color: #fff; font-size: 16px;
        }
        .auth-box button {
            width: 100%; padding: 12px; background: #00e676; border: none;
            border-radius: 6px; color: #1a1a1a; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 15px;
        }

        /* Interface Principale */
        #sidebar { width: 350px; background: #222; display: flex; flex-direction: column; border-right: 2px solid #333; }
        .header { padding: 20px; background: #111; border-bottom: 2px solid #333; text-align: center; }
        .header h1 { font-size: 20px; color: #00e676; font-weight: 600; }
        .status-bar { padding: 10px; background: #2c2c2c; text-align: center; font-size: 13px; font-weight: bold; }
        .online { color: #00e676; } .offline { color: #ff5252; }
        
        .panel { flex: 1; padding: 20px; overflow-y: auto; }
        .panel h3 { margin-bottom: 15px; font-size: 14px; text-transform: uppercase; color: #aaa; letter-spacing: 1px; }
        
        .log-container {
            background: #111; border-radius: 8px; padding: 15px; height: 180px;
            overflow-y: auto; font-family: monospace; font-size: 12px; border: 1px solid #333; margin-bottom: 20px;
        }
        .log-line { margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid #222; }
        .log-infraction { color: #ff5252; font-weight: bold; }
        .log-plainte { color: #ffb300; }

        #map-container { flex: 1; position: relative; background: #111; }
        #map { width: 100%; height: 100%; }

        /* Style du Bouton Ma Position */
        .geo-btn {
            position: absolute; top: 80px; left: 10px; z-index: 1000;
            background: white; width: 34px; height: 34px; border-radius: 4px;
            border: 2px solid rgba(0,0,0,0.2); cursor: pointer;
            display: flex; justify-content: center; align-items: center; font-size: 18px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.65); transition: background 0.2s;
        }
        .geo-btn:hover { background: #f4f4f4; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h2>TransTrack Admin</h2>
            <input type="text" name="prevent_autofill" id="prevent_autofill" style="display:none;" />
            <input type="password" name="prevent_autofill_pwd" id="prevent_autofill_pwd" style="display:none;" />
            
            <input type="text" id="username" placeholder="Identifiant" autocomplete="new-password" required>
            <input type="password" id="password" placeholder="Mot de passe" autocomplete="new-password" required>
            <button onclick="verifierLogin()">Se connecter</button>
            <p id="auth-error" style="color: #ff5252; margin-top: 10px; font-size: 14px; display: none;">Accès refusé.</p>
        </div>
    </div>

    <div id="sidebar">
        <div class="header">
            <h1>TRANSTRACK EXPERT</h1>
        </div>
        <div id="status-indicator" class="status-bar offline">SERVEUR HORS LIGNE</div>
        
        <div class="panel">
            <h3>Alertes Géophoniques (Déviations)</h3>
            <div id="infractions-log" class="log-container"></div>
            
            <h3>Plaintes Citoyennes (MQTT)</h3>
            <div id="plaintes-log" class="log-container"></div>
        </div>
    </div>

    <div id="map-container">
        <div id="map"></div>
        <button class="geo-btn" onclick="geolocaliserUtilisateur()" title="Ma position">🎯</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Force le vidage des champs à l'ouverture pour bloquer le pré-remplissage persistant
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
            }, 50);
        });

        // 1. SÉCURITÉ ACCÈS
        function verifierLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            if(user === "admin" && pass === "admin123") {
                document.getElementById('auth-screen').style.display = 'none';
                initialiserSysteme();
            } else {
                const err = document.getElementById('auth-error');
                err.style.display = 'block';
                err.innerText = "Identifiants invalides.";
            }
        }

        // 2. INITIALISATION CARTOGRAPHIE HAUTE FLUIDITÉ
        let map, busMarkers = {}, userLocationMarker = null;

        function initialiserSysteme() {
            // Configuration de la carte avec optimisation de la mise en cache et de la réactivité visuelle
            map = L.map('map', {
                fadeAnimation: true,
                zoomAnimation: true,
                markerZoomAnimation: true,
                updateWhenIdle: false,      // Force le chargement continu des tuiles pendant les mouvements
                updateWhenZooming: true     // Empêche l'apparition des rectangles blancs lors du zoom
            }).setView([-11.6608, 27.4794], 14); // Centrage par défaut sur Lubumbashi

            // Utilisation des tuiles Satellite Esri avec paramètres de fluidité avancés
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: 'Tiles &copy; Esri',
                maxZoom: 19,
                keepBuffer: 8,              // Charge 8 rangées de tuiles hors écran en avance pour éviter les trous blancs
                updateWhenIdle: false
            }).addTo(map);

            connecterServeur();
        }

        // FUNCTION DE GÉOLOCALISATION DE L'UTILISATEUR (Bouton Cible)
        function geolocaliserUtilisateur() {
            if (!navigator.geolocation) {
                alert("La géolocalisation n'est pas supportée par ton navigateur.");
                return;
            }

            navigator.geolocation.getCurrentPosition((position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;

                // Centrer la carte avec une animation fluide
                map.setView([lat, lon], 16, { animate: true, duration: 1 });

                // Placer ou déplacer le marqueur de l'utilisateur
                if (userLocationMarker) {
                    userLocationMarker.setLatLng([lat, lon]);
                } else {
                    const userIcon = L.divIcon({
                        className: 'custom-user-icon',
                        html: '<div style="background-color: #007bff; width: 14px; height: 14px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 8px rgba(0,0,0,0.5);"></div>',
                        iconSize: [14, 14],
                        iconAnchor: [7, 7]
                    });
                    userLocationMarker = L.marker([lat, lon], { icon: userIcon }).addTo(map)
                        .bindPopup("<b>Votre position actuelle</b>").openPopup();
                }
            }, (error) => {
                alert("Impossible de récupérer votre position : " + error.message);
            }, {
                enableHighAccuracy: true // Force l'utilisation du GPS précis si disponible
            });
        }

        // 3. LOGIQUE RÉSEAU (INTERCONNEXION CLOUD RENDER)
        function connecterServeur() {
            const statusIndicator = document.getElementById('status-indicator');
            
            // Connexion sécurisée au WebService sur ton Render Cloud
            const socket = new WebSocket('wss://transtrack-backend-1grb.onrender.com');

            socket.onopen = () => {
                statusIndicator.innerText = "SERVEUR CLOUD EN LIGNE";
                statusIndicator.className = "status-bar online";
            };

            socket.onclose = () => {
                statusIndicator.innerText = "SERVEUR HORS LIGNE (TENTATIVE...)";
                statusIndicator.className = "status-bar offline";
                setTimeout(connecterServeur, 5000); // Reconnexion automatique si le serveur s'endort
            };

            socket.onmessage = (event) => {
                const paquet = jsonParseSecure(event.data);
                if (!paquet) return;

                if (paquet.type === "POSITION") {
                    mettreAjourBus(paquet.data);
                } else if (paquet.type === "INFRACTION_TRAJET") {
                    ajouterLogInfraction(paquet.data);
                } else if (paquet.type === "PLAINTE") {
                    ajouterLogPlainte(paquet.data);
                }
            };
        }

        // 4. METTRE À JOUR LA POSITION DU BUS
        function mettreAjourBus(data) {
            const id = data.id_vehicule;
            const lat = data.latitude;
            const lon = data.longitude;

            if (busMarkers[id]) {
                // Déplacement fluide vers les nouvelles coordonnées
                busMarkers[id].setLatLng([lat, lon]);
            } else {
                // Icône verte distinctive pour le bus tracé
                const busIcon = L.divIcon({
                    className: 'custom-bus-icon',
                    html: `<div style="background-color: #00e676; color: #1a1a1a; font-weight: bold; font-size: 11px; width: 24px; height: 24px; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 2px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.4);">#${id}</div>`,
                    iconSize: [24, 24],
                    iconAnchor: [12, 12]
                });
                busMarkers[id] = L.marker([lat, lon], { icon: busIcon }).addTo(map);
            }
        }

        // 5. ENREGISTREMENT DES LOGS DANS L'INTERFACE
        function ajouterLogInfraction(data) {
            const container = document.getElementById('infractions-log');
            const ligne = document.createElement('div');
            ligne.className = "log-line log-infraction";
            ligne.innerHTML = `⚠️ [BUS #${data.id_vehicule}] Déviation majeure détectée ! Écart : ${parseFloat(data.distance_ecart).toFixed(1)} mètres.`;
            container.prepend(ligne);
        }

        function ajouterLogPlainte(data) {
            const container = document.getElementById('plaintes-log');
            const ligne = document.createElement('div');
            ligne.className = "log-line log-plainte";
            ligne.innerHTML = `📩 [BUS #${data.id_vehicule}] Plainte : "${data.message}"`;
            container.prepend(ligne);
        }

        function jsonParseSecure(texte) {
            try { return JSON.parse(texte); } 
            catch(e) { return null; }
        }
    </script>
</body>
</html>
